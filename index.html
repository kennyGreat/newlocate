<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>My To-Do List</h1>
      <div class="stats">
        <span id="stat-total">0 total</span>
        <span class="divider">·</span>
        <span id="stat-remaining">0 remaining</span>
        <span class="divider">·</span>
        <span id="stat-completed">0 completed</span>
      </div>
    </header>

    <div class="input-section">
      <form id="todo-form" novalidate>
        <input
          type="text"
          id="todo-input"
          placeholder="What needs to be done?"
          autocomplete="off"
          aria-label="New to-do item"
        />
        <button type="submit" id="add-btn" aria-label="Add to-do">Add</button>
      </form>
      <p id="error-msg" class="error" aria-live="polite"></p>
    </div>

    <div class="filters" role="group" aria-label="Filter tasks">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <ul id="todo-list" aria-label="To-do items"></ul>

    <div class="list-footer">
      <button id="clear-completed-btn">Clear Completed</button>
    </div>
  </div>

  <!-- Edit modal -->
  <div id="edit-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal-content">
      <h2 id="modal-title">Edit Task</h2>
      <form id="edit-form" novalidate>
        <input
          type="text"
          id="edit-input"
          aria-label="Edit task text"
          autocomplete="off"
        />
        <p id="edit-error-msg" class="error" aria-live="polite"></p>
        <div class="modal-actions">
          <button type="submit" id="save-edit-btn">Save</button>
          <button type="button" id="cancel-edit-btn">Cancel</button>
        </div>
      </form>
    </div>
  </div>
  <div id="modal-overlay" class="modal-overlay" hidden></div>

  <script src="script.js"></script>
</body>
</html>
